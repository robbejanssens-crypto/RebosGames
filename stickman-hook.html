<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickman Hook - Grappling Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #333;
            font-weight: bold;
            font-size: 18px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .ui-item {
            margin: 8px 0;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 100;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            color: #00d4ff;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            z-index: 200;
            display: none;
            border: 3px solid #00d4ff;
            min-width: 300px;
        }

        .game-over h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 1.2rem;
            margin: 10px 0;
        }

        .game-over button {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            margin-right: 10px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .game-over button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4);
        }

        .pause-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            color: #00d4ff;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            z-index: 200;
            display: none;
            border: 3px solid #00d4ff;
        }

        .pause-screen h1 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .pause-screen p {
            font-size: 1rem;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div class="ui">
            <div class="ui-item">Score: <span id="score">0</span></div>
            <div class="ui-item">Distance: <span id="distance">0</span>m</div>
            <div class="ui-item">Height: <span id="height">0</span>m</div>
        </div>

        <div class="controls">
            🖱️ Click & Drag to Hook | Space to Pause | R to Restart
        </div>

        <div class="game-over" id="gameOverScreen">
            <h1>GAME OVER!</h1>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p>Distance Traveled: <span id="finalDistance">0</span>m</p>
            <p>Max Height: <span id="finalHeight">0</span>m</p>
            <button onclick="location.reload()">Play Again</button>
            <button onclick="window.history.back()">Back to Menu</button>
        </div>

        <div class="pause-screen" id="pauseScreen">
            <h1>PAUSED</h1>
            <p>Press Space to Resume</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game variables
        let gameRunning = true;
        let gamePaused = false;
        let mouseDown = false;
        let mouseX = 0;
        let mouseY = 0;

        let stickman = {
            x: canvas.width / 2,
            y: canvas.height - 200,
            vx: 0,
            vy: 0,
            radius: 8,
            width: 15,
            height: 30,
            grappled: false,
            grappleX: 0,
            grappleY: 0,
            ropeLength: 0
        };

        let game = {
            score: 0,
            distance: 0,
            maxHeight: 0,
            gravity: 0.6,
            friction: 0.99
        };

        // Obstacles
        let platforms = [];
        let coins = [];
        let obstacles = [];
        let cameraY = canvas.height / 2;

        class Platform {
            constructor(x, y, width, height, type = 'normal') {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.type = type;
                this.color = type === 'spike' ? '#FF4444' : type === 'moving' ? '#FFD700' : '#4CAF50';
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);

                if (this.type === 'spike') {
                    ctx.fillStyle = '#FF0000';
                    for (let i = 0; i < 3; i++) {
                        ctx.beginPath();
                        ctx.moveTo(this.x + i * this.width / 3, this.y);
                        ctx.lineTo(this.x + (i + 0.5) * this.width / 3, this.y - 10);
                        ctx.lineTo(this.x + (i + 1) * this.width / 3, this.y);
                        ctx.fill();
                    }
                }
            }
        }

        class Coin {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 8;
                this.rotation = 0;
            }

            draw() {
                this.rotation += 0.1;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#FFA500';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();
            }
        }

        // Generate level
        function generateLevel() {
            platforms = [];
            coins = [];

            // Create scrolling platforms
            for (let i = 0; i < 20; i++) {
                const y = canvas.height - i * 100;
                const x = Math.random() * (canvas.width - 100) + 50;
                const width = Math.random() * 100 + 60;

                const type = Math.random() > 0.85 ? 'spike' : Math.random() > 0.8 ? 'moving' : 'normal';
                platforms.push(new Platform(x, y, width, 15, type));

                // Add coins
                if (Math.random() > 0.7) {
                    coins.push(new Coin(x + width / 2, y - 30));
                }
            }
        }

        // Input handling
        const keys = {};
        window.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                gamePaused = !gamePaused;
                document.getElementById('pauseScreen').style.display = gamePaused ? 'block' : 'none';
            }
            if (e.key === 'r' || e.key === 'R') {
                location.reload();
            }
            keys[e.key] = true;
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        canvas.addEventListener('mousedown', (e) => {
            mouseDown = true;
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('mouseup', () => {
            mouseDown = false;
            stickman.grappled = false;
        });

        canvas.addEventListener('mouseleave', () => {
            mouseDown = false;
            stickman.grappled = false;
        });

        // Collision detection
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        function checkCircleCollision(circle, rect) {
            const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.width));
            const closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.height));
            const dx = circle.x - closestX;
            const dy = circle.y - closestY;
            return (dx * dx + dy * dy) < (circle.radius * circle.radius);
        }

        // Draw stickman
        function drawStickman() {
            const screenY = stickman.y - cameraY + canvas.height / 2;
            
            if (screenY < -50 || screenY > canvas.height + 50) return;

            ctx.strokeStyle = '#333';
            ctx.lineWidth = 3;
            ctx.fillStyle = '#00d4ff';

            // Head
            ctx.beginPath();
            ctx.arc(stickman.x, screenY - 15, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Body
            ctx.beginPath();
            ctx.moveTo(stickman.x, screenY - 7);
            ctx.lineTo(stickman.x, screenY + 10);
            ctx.stroke();

            // Arms
            ctx.beginPath();
            ctx.moveTo(stickman.x - 10, screenY);
            ctx.lineTo(stickman.x + 10, screenY);
            ctx.stroke();

            // Legs
            ctx.beginPath();
            ctx.moveTo(stickman.x - 5, screenY + 10);
            ctx.lineTo(stickman.x - 5, screenY + 20);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(stickman.x + 5, screenY + 10);
            ctx.lineTo(stickman.x + 5, screenY + 20);
            ctx.stroke();

            // Draw rope if grappling
            if (stickman.grappled && mouseDown) {
                const screenGrappleY = stickman.grappleY - cameraY + canvas.height / 2;
                ctx.strokeStyle = '#FF6B6B';
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(stickman.x, screenY - 15);
                ctx.lineTo(stickman.grappleX, screenGrappleY);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        // Update game
        function update() {
            if (!gameRunning || gamePaused) return;

            // Grapple mechanics
            if (mouseDown) {
                if (!stickman.grappled) {
                    // Start grappling
                    const screenY = stickman.y - cameraY + canvas.height / 2;
                    const dist = Math.hypot(mouseX - stickman.x, mouseY - screenY);
                    
                    if (dist < 300) {
                        stickman.grappled = true;
                        stickman.grappleX = mouseX;
                        stickman.grappleY = cameraY + mouseY - canvas.height / 2;
                        stickman.ropeLength = dist;
                    }
                }

                if (stickman.grappled) {
                    stickman.grappleX = mouseX;
                    stickman.grappleY = cameraY + mouseY - canvas.height / 2;

                    // Pull towards grapple point
                    const dx = stickman.grappleX - stickman.x;
                    const dy = stickman.grappleY - stickman.y;
                    const dist = Math.hypot(dx, dy);
                    const force = 0.15;

                    stickman.vx += (dx / dist) * force;
                    stickman.vy += (dy / dist) * force;
                }
            }

            // Apply gravity
            stickman.vy += game.gravity;

            // Apply friction
            stickman.vx *= game.friction;
            stickman.vy *= game.friction;

            // Update position
            stickman.x += stickman.vx;
            stickman.y += stickman.vy;

            // Keep in bounds horizontally
            if (stickman.x < 0) stickman.x = canvas.width;
            if (stickman.x > canvas.width) stickman.x = 0;

            // Update game stats
            game.distance = Math.round(stickman.x);
            game.maxHeight = Math.max(game.maxHeight, Math.round(canvas.height - stickman.y));

            // Platform collision
            for (let platform of platforms) {
                if (stickman.vy > 0 && 
                    stickman.y + stickman.radius > platform.y &&
                    stickman.y + stickman.radius < platform.y + platform.height + 10 &&
                    stickman.x > platform.x - stickman.radius &&
                    stickman.x < platform.x + platform.width + stickman.radius) {
                    
                    stickman.vy = -15;

                    if (platform.type === 'spike') {
                        endGame();
                    }

                    game.score += 10;
                }
            }

            // Coin collection
            for (let i = coins.length - 1; i >= 0; i--) {
                const dx = stickman.x - coins[i].x;
                const dy = stickman.y - coins[i].y;
                if (Math.hypot(dx, dy) < 20) {
                    game.score += 50;
                    coins.splice(i, 1);
                }
            }

            // Game over if falling too far
            if (stickman.y > cameraY + canvas.height) {
                endGame();
            }

            // Update camera
            cameraY = stickman.y - 200;

            // Update UI
            document.getElementById('score').textContent = game.score;
            document.getElementById('distance').textContent = game.distance;
            document.getElementById('height').textContent = game.maxHeight;
        }

        // Draw game
        function draw() {
            ctx.fillStyle = 'linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw clouds
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            const cloudY = (cameraY / 2) % canvas.height;
            ctx.beginPath();
            ctx.arc(100 + cloudY, 50, 20, 0, Math.PI * 2);
            ctx.arc(140 + cloudY, 50, 15, 0, Math.PI * 2);
            ctx.fill();

            // Draw platforms
            for (let platform of platforms) {
                const screenY = platform.y - cameraY + canvas.height / 2;
                if (screenY > -20 && screenY < canvas.height + 20) {
                    ctx.fillStyle = platform.color;
                    ctx.fillRect(platform.x, screenY, platform.width, platform.height);

                    if (platform.type === 'spike') {
                        ctx.fillStyle = '#FF0000';
                        for (let i = 0; i < 3; i++) {
                            ctx.beginPath();
                            ctx.moveTo(platform.x + i * platform.width / 3, screenY);
                            ctx.lineTo(platform.x + (i + 0.5) * platform.width / 3, screenY - 10);
                            ctx.lineTo(platform.x + (i + 1) * platform.width / 3, screenY);
                            ctx.fill();
                        }
                    }
                }
            }

            // Draw coins
            for (let coin of coins) {
                const screenY = coin.y - cameraY + canvas.height / 2;
                if (screenY > -20 && screenY < canvas.height + 20) {
                    ctx.save();
                    ctx.translate(coin.x, screenY);
                    coin.rotation = (coin.rotation || 0) + 0.1;
                    ctx.rotate(coin.rotation);
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.arc(0, 0, 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#FFA500';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.restore();
                }
            }

            drawStickman();
        }

        // Game over
        function endGame() {
            gameRunning = false;
            document.getElementById('gameOverScreen').style.display = 'block';
            document.getElementById('finalScore').textContent = game.score;
            document.getElementById('finalDistance').textContent = game.distance;
            document.getElementById('finalHeight').textContent = game.maxHeight;
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Initialize
        generateLevel();
        gameLoop();
    </script>
</body>
</html>
